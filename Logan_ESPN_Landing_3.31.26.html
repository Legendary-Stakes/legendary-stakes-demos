<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legendary Stakes - ESPN Style Landing</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const DISCIPLINES_MAIN = ["Cutting","Reining","Cow Horse","Barrel Racing","Team Roping","Tie-Down","Breakaway","Steer Wrestling"];
    const DISCIPLINES_MORE = ["Pole Bending","Western Pleasure","Hunter Under Saddle","Trail","Showmanship","Halter","Western Riding","Ranch Riding"];
    function App() {
      const [moreOpen,setMoreOpen]=useState(false);
      const [activeDiscipline,setActiveDiscipline]=useState(null);
      const [tickerOffset,setTickerOffset]=useState(0);
      const [heroLoaded,setHeroLoaded]=useState(false);
      const LIVE_EVENTS=[{event:"NCHA Summer Spectacular",loc:"Fort Worth, TX",class:"Open",leader:"Metallic Cat x Smart Little Lena",score:"228",status:"Final"},{event:"NRHA Futurity",loc:"OKC, OK",class:"Open L4",leader:"Gunner x Topsail Whiz",score:"224.5",status:"Go 2"},{event:"AQHA World",loc:"OKC, OK",class:"Jr Cutting",leader:"Dual Rey x Peptoboonsmal",score:"221",status:"Live"},{event:"Snaffle Bit Fut.",loc:"Reno, NV",class:"Open RCH",leader:"One Time Pepto x Boon San",score:"219",status:"Final"},{event:"The Run For A Million",loc:"Las Vegas, NV",class:"Barrel Racing",leader:"French Streaktovegas",score:"14.82s",status:"Semi"},{event:"NRBC",loc:"Ogden, UT",class:"Open Reining",leader:"Spooks Gotta Whiz x Custom Crome",score:"226",status:"Go 3"},{event:"World Series Team Roping",loc:"Stephenville, TX",class:"#12 Header",leader:"Coleman / Smith",score:"4.8s",status:"Live"},{event:"PCCHA Stakes",loc:"Paso Robles, CA",class:"Non-Pro",leader:"Hottish x Smooth As A Cat",score:"220.5",status:"Final"}];
      const gold="#B8960C",goldLight="#D4AF37",goldBg="#FDF8E8",goldBorder="#E8D48A",dark="#1a1a1a",midGray="#555",lightGray="#888",borderColor="#e0e0e0";
      useEffect(()=>{setHeroLoaded(true);},[]);
      useEffect(()=>{const i=setInterval(()=>{setTickerOffset(p=>{const m=LIVE_EVENTS.length*220-900;return p>=m?0:p+220;});},4000);return()=>clearInterval(i);},[]);
      return <div style={{fontFamily:"'DM Sans',sans-serif",background:"#fff",color:dark,minHeight:"100vh"}}><div style={{background:"#fff",borderBottom:"1px solid "+borderColor,overflow:"hidden"}}><div style={{display:"flex",alignItems:"center"}}><div style={{background:goldBg,padding:"8px 16px",display:"flex",alignItems:"center",gap:8,borderRight:"1px solid "+goldBorder,flexShrink:0}}><span style={{fontSize:11,fontWeight:700,color:gold,letterSpacing:1,textTransform:"uppercase"}}>Live Events</span></div><div style={{overflow:"hidden",flex:1}}><div style={{display:"flex",transition:"transform 0.6s",transform:"translateX(-"+tickerOffset+"px)"}}>{LIVE_EVENTS.map((ev,i)=><div key={i} style={{minWidth:220,padding:"6px 16px",borderRight:"1px solid "+borderColor,cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:10,color:lightGray}}>{ev.event}</span><span style={{fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:3,background:ev.status==="Live"?gold:ev.status==="Semi"?"#4CAF50":"#e8e8e8",color:ev.status==="Live"||ev.status==="Semi"?"#fff":"#666"}}>{ev.status}</span></div><div style={{fontSize:11,color:midGray}}>{ev.class}</div><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,fontWeight:600,color:dark,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.leader}</span><span style={{fontSize:13,fontWeight:700,color:gold}}>{ev.score}</span></div></div>)}</div></div><button onClick={()=>setTickerOffset(p=>Math.max(0,p-220))} style={{background:"#fafafa",border:"none",color:lightGray,padding:"12px 8px",cursor:"pointer",borderLeft:"1px solid "+borderColor,fontSize:16}}>&#8249;</button><button onClick={()=>setTickerOffset(p=>p+220)} style={{background:"#fafafa",border:"none",color:lightGray,padding:"12px 8px",cursor:"pointer",borderLeft:"1px solid "+borderColor,fontSize:16}}>&#8250;</button></div></div><nav style={{background:"#fff",borderBottom:"3px solid "+gold,padding:"0 24px",display:"flex",alignItems:"center",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}><div style={{marginRight:28,padding:"10px 0",flexShrink:0}}><div style={{display:"flex",alignItems:"baseline",lineHeight:1}}><span style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:22,color:dark,letterSpacing:2}}>LEGEN</span><span style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:22,background:"linear-gradient(135deg,"+gold+","+goldLight+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:2}}>D</span><span style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:22,color:dark,letterSpacing:2}}>ARY</span></div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:9,letterSpacing:5,color:gold,textAlign:"center",marginTop:-2,textTransform:"uppercase"}}>stakes</div></div><div style={{display:"flex",alignItems:"center",flex:1,overflow:"hidden"}}>{DISCIPLINES_MAIN.map(d=><button key={d} onClick={()=>setActiveDiscipline(d)} style={{background:"transparent",border:"none",color:activeDiscipline===d?gold:midGray,fontSize:13,fontWeight:600,padding:"16px 14px",cursor:"pointer",borderBottom:activeDiscipline===d?"2px solid "+gold:"2px solid transparent",whiteSpace:"nowrap"}}>{d}</button>)}<div style={{position:"relative"}}><button onClick={()=>setMoreOpen(!moreOpen)} style={{background:"transparent",border:"none",color:lightGray,fontSize:13,padding:"16px 14px",cursor:"pointer",whiteSpace:"nowrap"}}>More Disciplines &#9662;</button>{moreOpen&&<div style={{position:"absolute",top:"100%",left:0,background:"#fff",border:"1px solid "+borderColor,borderRadius:8,padding:8,minWidth:200,zIndex:200,boxShadow:"0 12px 40px rgba(0,0,0,.12)"}}>{DISCIPLINES_MORE.map(d=><button key={d} onClick={()=>{setActiveDiscipline(d);setMoreOpen(false);}} style={{display:"block",width:"100%",textAlign:"left",background:"transparent",border:"none",color:"#444",fontSize:13,padding:"8px 12px",cursor:"pointer",borderRadius:4}}>{d}</button>)}</div>}</div></div><div style={{display:"flex",alignItems:"center",gap:16,marginLeft:16}}>{[{icon:"&#9654;",label:"Watch"},{icon:"&#127942;",label:"Fantasy"},{icon:"&#128205;",label:"Where to Watch"}].map((item,i)=><button key={i} style={{background:"transparent",border:"none",color:midGray,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}} dangerouslySetInnerHTML={{__html:item.icon+" "+item.label}} />)}</div></nav><div style={{background:goldBg,borderBottom:"1px solid "+goldBorder,padding:"16px 32px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:20}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,background:"linear-gradient(135deg,"+gold+","+goldLight+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>LS</div><div><div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:dark}}>LEGENDARY STAKES IS NOW THE HOME OF LIVE SHOWS</div><div style={{fontSize:12,color:lightGray,marginTop:2}}>All Major Western Performance Events. Live Results. All in One Place.</div></div></div><button style={{background:gold,color:"#fff",border:"none",padding:"10px 28px",fontSize:13,fontWeight:700,cursor:"pointer",borderRadius:4,textTransform:"uppercase"}}>SIGN UP NOW</button></div></div>;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
