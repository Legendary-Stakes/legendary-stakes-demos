<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legendary Stakes — ESPN Style Landing</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const DISCIPLINES_MAIN = ["Cutting","Reining","Cow Horse","Barrel Racing","Team Roping","Tie-Down","Breakaway","Steer Wrestling"];
    const DISCIPLINES_MORE = ["Pole Bending","Western Pleasure","Hunter Under Saddle","Trail","Showmanship","Halter","Western Riding","Ranch Riding"];
    const LIVE_EVENTS = [{event:"NCHA Summer Spectacular",loc:"Fort Worth, TX",class:"Open",leader:"Metallic Cat x Smart Little Lena",score:"228",status:"Final"},{event:"NRHA Futurity",loc:"OKC, OK",class:"Open L4",leader:"Gunner x Topsail Whiz",score:"224.5",status:"Go 2"},{event:"AQHA World",loc:"OKC, OK",class:"Jr Cutting",leader:"Dual Rey x Peptoboonsmal",score:"221",status:"Live"},{event:"Snaffle Bit Fut.",loc:"Reno, NV",class:"Open RCH",leader:"One Time Pepto x Boon San",score:"219",status:"Final"},{event:"The Run For A Million",loc:"Las Vegas, NV",class:"Barrel Racing",leader:"French Streaktovegas",score:"14.82s",status:"Semi"},{event:"NRBC",loc:"Ogden, UT",class:"Open Reining",leader:"Spooks Gotta Whiz x Custom Crome",score:"226",status:"Go 3"},{event:"World Series Team Roping",loc:"Stephenville, TX",class:"#12 Header",leader:"Coleman / Smith",score:"4.8s",status:"Live"},{event:"PCCHA Stakes",loc:"Paso Robles, CA",class:"Non-Pro",leader:"Hottish x Smooth As A Cat",score:"220.5",status:"Final"}];
    const TOP_HEADLINES = ["Metallic Cat progeny surpass $100M in lifetime earnings","NCHA announces record $12M added money for Summer Spectacular","Reining sensation Gunnatrashya sells for $1.2M at Heritage Sale","AQHA membership hits all-time high of 285,000 active members","New futurity age rules spark debate among cutting horse trainers","Barrel racing French Streaktovegas named Horse of the Year","Legendary Stakes launches AI-powered cross-matching for breeders","Team roping prize money up 34% year-over-year across all events","Oklahoma new equine tax incentive expected to draw major events","Ranch riding discipline sees 78% growth in amateur entries"];
    const FEATURED_STORIES = [{title:"How Todd Bergen Built a Dynasty: Inside the $40M Program",time:"2h",author:"Sarah Mitchell"},{title:"The Economics of a $500K Stallion Breeding Season",time:"5h",author:"Legendary Stakes Analytics"},{title:"2026 Futurity Preview: 15 Horses to Watch This Fall",time:"8h",author:"Jake Telford"}];
    const QUICK_LINKS = ["NCHA Standings","NRHA Standings","AQHA World Qualifiers","Barrel Racing Results","Team Roping Standings","Bloodstock Exchange"];
    function App() {
      const [moreOpen,setMoreOpen]=useState(false),[activeDiscipline,setActiveDiscipline]=useState(null),[tickerOffset,setTickerOffset]=useState(0),[heroLoaded,setHeroLoaded]=useState(false);
      const gold="#B8960C",goldLight="#D4AF37",goldBg="#FDF8E8",goldBorder="#E8D48A",dark="#1a1a1a",midGray="#555",lightGray="#888",borderColor="#e0e0e0";
      useEffect(()=>{setHeroLoaded(true);},[]);
      useEffect(()=>{const i=setInterval(()=>{setTickerOffset(p=>{const m=LIVE_EVENTS.length*220-900;return p>=m?0:p+220;});},4000);return()=>clearInterval(i);},[]);
      return <div style={{fontFamily:"DM Sans,sans-serif",background:"#fff",color:dark,minHeight:"100vh"}}>
        <div style={{borderBottom:"1px solid "+borderColor,overflow:"hidden"}}><div style={{display:"flex",alignItems:"center"}}>
          <div style={{background:goldBg,padding:"8px 16px",display:"flex",alignItems:"center",gap:8,borderRight:"1px solid "+goldBorder,flexShrink:0}}><span style={{fontSize:11,fontWeight:700,color:gold,letterSpacing:1,textTransform:"uppercase"}}>Live Events</span></div>
          <div style={{overflow:"hidden",flex:1}}><div style={{display:"flex",transition:"transform 0.6s",transform:"translateX(-"+tickerOffset+"px)"}}>{LIVE_EVENTS.map((ev,i)=><div key={i} style={{minWidth:220,padding:"6px 16px",borderRight:"1px solid "+borderColor,cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:10,color:lightGray}}>{ev.event}</span><span style={{fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:3,background:ev.status==="Live"?gold:ev.status==="Semi"?"#4CAF50":"#e8e8e8",color:ev.status==="Live"||ev.status==="Semi"?"#fff":"#666"}}>{ev.status}</span></div><div style={{fontSize:11,color:midGray}}>{ev.class}</div><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,fontWeight:600,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.leader}</span><span style={{fontSize:13,fontWeight:700,color:gold}}>{ev.score}</span></div></div>)}</div></div>
          <button onClick={()=>setTickerOffset(p=>Math.max(0,p-220))} style={{background:"#fafafa",border:"none",color:lightGray,padding:"12px 8px",cursor:"pointer",fontSize:16}}>&lsaquo;</button>
          <button onClick={()=>setTickerOffset(p=>p+220)} style={{background:"#fafafa",border:"none",color:lightGray,padding:"12px 8px",cursor:"pointer",fontSize:16}}>&rsaquo;</button>
        </div></div>
        <nav style={{background:"#fff",borderBottom:"3px solid "+gold,padding:"0 24px",display:"flex",alignItems:"center",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <div style={{marginRight:28,padding:"10px 0",flexShrink:0}}><div style={{display:"flex",alignItems:"baseline",lineHeight:1}}><span style={{fontFamily:"Playfair Display,serif",fontWeight:800,fontSize:22,color:dark,letterSpacing:2}}>LEGEN</span><span style={{fontFamily:"Playfair Display,serif",fontWeight:800,fontSize:22,background:"linear-gradient(135deg,"+gold+","+goldLight+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:2}}>D</span><span style={{fontFamily:"Playfair Display,serif",fontWeight:800,fontSize:22,color:dark,letterSpacing:2}}>ARY</span></div><div style={{fontSize:9,letterSpacing:5,color:gold,textAlign:"center",marginTop:-2,textTransform:"uppercase"}}>stakes</div></div>
          <div style={{display:"flex",alignItems:"center",flex:1,overflow:"hidden"}}>{DISCIPLINES_MAIN.map(d=><button key={d} onClick={()=>setActiveDiscipline(d)} style={{background:"transparent",border:"none",color:activeDiscipline===d?gold:midGray,fontSize:13,fontWeight:600,padding:"16px 14px",cursor:"pointer",borderBottom:activeDiscipline===d?"2px solid "+gold:"2px solid transparent",whiteSpace:"nowrap"}}>{d}</button>)}<div style={{position:"relative"}}><button onClick={()=>setMoreOpen(!moreOpen)} style={{background:"transparent",border:"none",color:lightGray,fontSize:13,padding:"16px 14px",cursor:"pointer",whiteSpace:"nowrap"}}>More Disciplines</button>{moreOpen&&<div style={{position:"absolute",top:"100%",left:0,background:"#fff",border:"1px solid "+borderColor,borderRadius:8,padding:8,minWidth:200,zIndex:200,boxShadow:"0 12px 40px rgba(0,0,0,.12)"}}>{DISCIPLINES_MORE.map(d=><button key={d} onClick={()=>{setActiveDiscipline(d);setMoreOpen(false);}} style={{display:"block",width:"100%",textAlign:"left",background:"transparent",border:"none",color:"#444",fontSize:13,padding:"8px 12px",cursor:"pointer"}}>{d}</button>)}</div>}</div></div>
          <div style={{display:"flex",gap:16,marginLeft:16}}><button style={{background:"transparent",border:"none",color:midGray,fontSize:12,cursor:"pointer"}}>Watch</button><button style={{background:"transparent",border:"none",color:midGray,fontSize:12,cursor:"pointer"}}>Fantasy</button><button style={{background:"transparent",border:"none",color:midGray,fontSize:12,cursor:"pointer"}}>Where to Watch</button></div>
        </nav>
        <div style={{background:goldBg,borderBottom:"1px solid "+goldBorder,padding:"16px 32px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:20}}><div style={{fontFamily:"Playfair Display,serif",fontSize:18,fontWeight:700,background:"linear-gradient(135deg,"+gold+","+goldLight+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>LS</div><div><div style={{fontFamily:"Playfair Display,serif",fontSize:20,fontWeight:700,color:dark}}>LEGENDARY STAKES IS NOW THE HOME OF LIVE SHOWS</div><div style={{fontSize:12,color:lightGray,marginTop:2}}>All Major Western Performance Events. Live Results. All in One Place.</div></div></div><button style={{background:gold,color:"#fff",border:"none",padding:"10px 28px",fontSize:13,fontWeight:700,cursor:"pointer",borderRadius:4}}>SIGN UP NOW</button></div>
        <div style={{display:"grid",gridTemplateColumns:"280px 1fr 300px",maxWidth:1400,margin:"0 auto"}}>
          <aside style={{padding:"20px 16px",borderRight:"1px solid "+borderColor}}>
            <div style={{background:dark,borderRadius:10,padding:24,textAlign:"center",marginBottom:20}}><div style={{fontFamily:"Playfair Display,serif",fontSize:20,fontWeight:700,color:"#fff",marginBottom:4}}>ALL OF <span style={{color:goldLight}}>LEGENDARY STAKES.</span></div><div style={{fontSize:13,color:"#999",marginBottom:16}}>ALL IN ONE PLACE.</div><button style={{background:gold,color:"#fff",border:"none",padding:"10px 32px",fontSize:13,fontWeight:600,borderRadius:4,cursor:"pointer",width:"100%"}}>Sign Up Now</button></div>
            <div style={{marginBottom:20}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}><span style={{color:gold}}>&#128205;</span><span style={{fontSize:14,fontWeight:600,color:dark}}>Watch on Legendary Stakes</span></div><button style={{background:gold,color:"#fff",border:"none",padding:"10px 0",fontSize:13,fontWeight:700,borderRadius:4,cursor:"pointer",width:"100%",marginBottom:14}}>Subscribe Now</button>{[{icon:"&#128052;",label:"NCHA Summer Spectacular - Live"},{icon:"&#127919;",label:"NRHA Futurity - Go Round 2"},{icon:"&#127999;",label:"Snaffle Bit Futurity Replay"},{icon:"&#9201;",label:"Run For A Million - Semis"},{icon:"&#128250;",label:"Legendary Stakes Originals"}].map((item,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px",cursor:"pointer",fontSize:13,color:"#444"}} dangerouslySetInnerHTML={{__html:item.icon+" "+item.label}} />)}</div>
            <div style={{borderTop:"1px solid "+borderColor,paddingTop:16}}><div style={{fontSize:14,fontWeight:700,color:dark,marginBottom:10}}>Quick Links</div>{QUICK_LINKS.map((link,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",fontSize:13,color:midGray,cursor:"pointer"}}><span style={{fontSize:10,color:gold}}>&#9670;</span> {link}</div>)}</div>
          </aside>
          <main style={{padding:"20px 24px"}}>
            <div style={{position:"relative",borderRadius:10,overflow:"hidden",marginBottom:24,cursor:"pointer",transform:heroLoaded?"translateY(0)":"translateY(12px)",opacity:heroLoaded?1:0,transition:"all .8s",border:"1px solid "+borderColor}}>
              <div style={{width:"100%",height:380,background:"linear-gradient(135deg,"+goldBg+" 0%,#f5eed4 30%,#e8dbb8 60%,#f0e8d0 100%)",position:"relative"}}><div style={{position:"absolute",top:16,left:16,background:gold,color:"#fff",fontSize:10,fontWeight:700,padding:"4px 10px",borderRadius:4}}>FEATURED</div></div>
              <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"0 24px 24px"}}><h1 style={{fontFamily:"Playfair Display,serif",fontSize:28,fontWeight:700,color:dark,lineHeight:1.25,marginBottom:10,maxWidth:500}}>The $2.4M Mare That Changed Cutting Forever</h1><p style={{fontSize:14,color:midGray,lineHeight:1.5,maxWidth:480,marginBottom:10}}>From a $35,000 yearling purchase to the most decorated mare in NCHA history.</p><div style={{fontSize:12,color:lightGray}}>12h &middot; <span style={{color:gold,fontWeight:600}}>Sarah Mitchell</span></div></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>{[{tag:"REINING",title:"NRHA Futurity Go 2: Three Horses Score 224+ in Historic Night",desc:"The Open finals are shaping up to be one of the most competitive in a decade.",time:"4h",author:"LS Staff"},{tag:"BARREL RACING",title:"2026 Run For A Million Semifinals: Who Punched Their Ticket",desc:"Eight riders advance to the million-dollar final round in Las Vegas.",time:"6h",author:"Tammy West"}].map((story,i)=><div key={i} style={{background:"#fff",borderRadius:8,overflow:"hidden",border:"1px solid "+borderColor,cursor:"pointer"}}><div style={{height:140,background:goldBg,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:48,opacity:0.2}}>{i===0?"&#127919;":"&#127943;"}</span></div><div style={{padding:"14px 16px"}}><div style={{fontSize:10,fontWeight:700,color:gold,letterSpacing:1.5,marginBottom:6}}>{story.tag}</div><div style={{fontSize:15,fontWeight:600,color:dark,lineHeight:1.3,marginBottom:6}}>{story.title}</div><div style={{fontSize:12,color:lightGray,marginBottom:8}}>{story.desc}</div><div style={{fontSize:11,color:"#aaa"}}>{story.time} &middot; {story.author}</div></div></div>)}</div>
            <div style={{marginBottom:24}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}><div style={{width:4,height:20,background:gold,borderRadius:2}}\/><span style={{fontSize:16,fontWeight:700,color:dark}}>Top Stories</span></div>{FEATURED_STORIES.map((story,i)=><div key={i} style={{padding:"12px",cursor:"pointer",borderBottom:"1px solid "+borderColor}}><div style={{fontSize:15,fontWeight:600,color:dark,marginBottom:4}}>{story.title}</div><div style={{fontSize:11,color:lightGray}}>{story.time} &middot; {story.author}</div></div>)}</div>
            <div style={{background:dark,borderRadius:10,padding:24,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:10,fontWeight:700,color:goldLight,letterSpacing:2,marginBottom:6}}>BLOODSTOCK EXCHANGE</div><div style={{fontFamily:"Playfair Display,serif",fontSize:20,fontWeight:700,color:"#fff",marginBottom:4}}>Heritage Select Sale - Live Now</div><div style={{fontSize:13,color:"#999"}}>142 lots &middot; $18.4M in total sales &middot; 94% sell rate</div></div><button style={{background:gold,color:"#fff",border:"none",padding:"10px 24px",fontSize:12,fontWeight:700,borderRadius:4,cursor:"pointer"}}>VIEW SALE</button></div>
          </main>
          <aside style={{padding:"20px 16px",borderLeft:"1px solid "+borderColor}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><div style={{width:3,height:16,background:gold,borderRadius:2}}\/><span style={{fontSize:15,fontWeight:700,color:dark}}>Top Headlines</span></div>
            {TOP_HEADLINES.map((h,i)=><div key={i} style={{padding:"10px 0",borderBottom:"1px solid "+borderColor,fontSize:13,color:"#444",cursor:"pointer",lineHeight:1.4}}>{h}</div>)}
            <div style={{background:"#fafafa",borderRadius:8,padding:16,marginTop:20,border:"1px solid "+borderColor}}><div style={{fontSize:10,fontWeight:700,color:gold,letterSpacing:2,marginBottom:12}}>RPI POWER RANKINGS</div>{[{rank:1,name:"Metallic Cat",pts:"2,847",change:"+2"},{rank:2,name:"Smooth As A Cat",pts:"2,691",change:"--"},{rank:3,name:"High Brow Cat",pts:"2,584",change:"-1"},{rank:4,name:"One Time Pepto",pts:"2,410",change:"+3"},{rank:5,name:"Dual Rey",pts:"2,388",change:"-1"}].map((item,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<4?"1px solid "+borderColor:"none"}}><span style={{width:22,height:22,borderRadius:"50%",background:i===0?gold:"#e8e8e8",color:i===0?"#fff":lightGray,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{item.rank}</span><div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:dark}}>{item.name}</div><div style={{fontSize:10,color:lightGray}}>{item.pts} pts</div></div><span style={{fontSize:10,fontWeight:600,color:item.change.startsWith("+")?"#4CAF50":"#e74c3c"}}>{item.change}</span></div>)}</div>
            <div style={{background:dark,borderRadius:8,padding:20,marginTop:20,textAlign:"center"}}><div style={{fontFamily:"Playfair Display,serif",fontSize:16,fontWeight:700,color:"#fff",marginBottom:4}}>THE HOME OF WESTERN PERFORMANCE</div><div style={{fontSize:11,color:"#999",marginBottom:16}}>All Shows. All Disciplines. All in One Place.</div><button style={{background:gold,color:"#fff",border:"none",padding:"10px 24px",fontSize:12,fontWeight:700,borderRadius:4,cursor:"pointer",width:"100%"}}>SIGN UP NOW</button></div>
          </aside>
        </div>
      </div>;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
